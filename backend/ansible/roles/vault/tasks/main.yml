---
- name: Install dependencies
  apt:
    name: [gpg, curl]
    state: present
    update_cache: true

- name: Add HashiCorp GPG key
  apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: present

- name: Add HashiCorp repository
  apt_repository:
    repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present

- name: Install Vault
  apt:
    name: "vault={{ vault_version }}-1"
    state: present
    update_cache: true

- name: Create Vault directories
  file:
    path: "{{ item }}"
    state: directory
    owner: vault
    group: vault
    mode: "0750"
  loop:
    - "{{ vault_data_dir }}"
    - "{{ vault_config_dir }}"

- name: Deploy Vault config
  copy:
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: vault
    group: vault
    mode: "0640"
    content: |
      ui = {{ vault_ui_enabled | lower }}
      disable_mlock = true

      storage "{{ vault_storage_backend }}" {
        path = "{{ vault_data_dir }}"
      }

      listener "tcp" {
        address     = "0.0.0.0:{{ vault_port }}"
        tls_disable = true
      }

- name: Enable and start Vault service
  systemd:
    name: vault
    enabled: true
    state: started
    daemon_reload: true
