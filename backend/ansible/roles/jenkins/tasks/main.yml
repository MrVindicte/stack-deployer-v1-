---
- name: Install dependencies
  apt:
    name: [docker.io, docker-compose-plugin]
    state: present
    update_cache: true

- name: Create Jenkins data directory
  file:
    path: "{{ jenkins_data_dir }}"
    state: directory
    owner: 1000
    group: 1000
    mode: "0755"

- name: Deploy Jenkins via Docker Compose
  copy:
    dest: /opt/jenkins/docker-compose.yml
    content: |
      version: "3.8"
      services:
        jenkins:
          image: {{ jenkins_docker_image }}
          ports:
            - "{{ jenkins_port }}:8080"
            - "{{ jenkins_agent_port }}:50000"
          volumes:
            - {{ jenkins_data_dir }}:/var/jenkins_home
            - /var/run/docker.sock:/var/run/docker.sock
          environment:
            JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
          restart: unless-stopped

- name: Start Jenkins
  community.docker.docker_compose_v2:
    project_src: /opt/jenkins
    state: present

- name: Wait for Jenkins to be ready
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ jenkins_port }}"
    timeout: 120
