---
- name: Install dependencies
  ansible.builtin.apt:
    name: [apt-transport-https, software-properties-common, wget]
    state: present
    update_cache: true

- name: Add Grafana GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.asc
    mode: "0644"

- name: Add Grafana repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
    filename: grafana
    state: present

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Set admin password
  ansible.builtin.lineinfile:
    path: /etc/grafana/grafana.ini
    regexp: "^;?admin_password ="
    line: "admin_password = {{ grafana_admin_password }}"
    insertafter: "\\[security\\]"
  notify: restart grafana

- name: Configure Prometheus datasource
  ansible.builtin.copy:
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    mode: "0644"
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://localhost:9090
          isDefault: true
          editable: false
  notify: restart grafana

- name: Start and enable Grafana
  ansible.builtin.systemd:
    name: grafana-server
    state: started
    enabled: true
