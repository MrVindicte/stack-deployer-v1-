---
# Role: domain-join — Join a Windows machine to the AD domain.

- name: Set DNS to domain controller
  ansible.windows.win_dns_client:
    adapter_names: '*'
    dns_servers:
      - "{{ dc_ip_address }}"

- name: Check current domain membership
  ansible.windows.win_powershell:
    script: |
      $cs = Get-CimInstance Win32_ComputerSystem
      $Ansible.Result = $cs.PartOfDomain.ToString()
  register: domain_check

- name: Join domain
  ansible.windows.win_domain_membership:
    dns_domain_name: "{{ domain_name }}"
    domain_admin_user: "{{ domain_admin_user | default('Administrator') }}@{{ domain_name }}"
    domain_admin_password: "{{ domain_admin_password }}"
    domain_ou_path: "{{ domain_ou | default(omit) }}"
    state: domain
  register: domain_join
  when: domain_check.result == "False"

- name: Reboot after domain join
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 30
  when: domain_join is changed

- name: Verify domain membership
  ansible.windows.win_powershell:
    script: |
      $cs = Get-CimInstance Win32_ComputerSystem
      Write-Output "Domain: $($cs.Domain) | Joined: $($cs.PartOfDomain)"
  register: verify_result

- name: Display result
  ansible.builtin.debug:
    msg: "{{ verify_result.output | join('') }}"
