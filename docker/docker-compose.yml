version: "3.9"

services:
  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: sd-backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/stacks:/app/stacks
      - ./backend/ansible:/app/ansible
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: sd-celery
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/ansible:/app/ansible
      # Mount SSH keys — adjust the host path to your actual SSH directory
      - ${SSH_KEY_DIR:-/root/.ssh}:/root/.ssh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker -l info -c 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping", "-t", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: node:20-slim
    container_name: sd-frontend
    working_dir: /app
    ports: ["5173:5173"]
    volumes: ["./frontend:/app", "/app/node_modules"]
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sd-redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sd-postgres
    env_file: ./backend/.env
    environment:
      POSTGRES_DB: stack_deployer
      POSTGRES_USER: deployer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployer -d stack_deployer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
  pg_data:
