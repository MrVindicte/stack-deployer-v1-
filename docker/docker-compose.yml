version: "3.9"

services:
  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: sd-backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/stacks:/app/stacks
      - ./backend/ansible:/app/ansible
    depends_on: [redis, postgres]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  celery:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: sd-celery
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/ansible:/app/ansible
      - ${HOME}/.ssh:/root/.ssh:ro
    depends_on: [redis, postgres]
    command: celery -A app.core.celery_app worker -l info -c 2
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: sd-frontend
    working_dir: /app
    ports: ["5173:5173"]
    volumes: ["./frontend:/app", "/app/node_modules"]
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sd-redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sd-postgres
    environment:
      POSTGRES_DB: stack_deployer
      POSTGRES_USER: deployer
      POSTGRES_PASSWORD: change-me-in-production
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
